<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="#10101a"/>

  <!-- EQ frequency bars (logarithmically spaced) -->
  <rect x="42"  y="290" width="36" height="162" rx="7" fill="#00c8ff" opacity=".75"/>
  <rect x="92"  y="230" width="36" height="222" rx="7" fill="#00c8ff" opacity=".80"/>
  <rect x="142" y="175" width="36" height="277" rx="7" fill="#00c8ff" opacity=".85"/>
  <rect x="192" y="145" width="36" height="307" rx="7" fill="#00c8ff"/>
  <rect x="242" y="165" width="36" height="287" rx="7" fill="#00c8ff"/>
  <rect x="292" y="195" width="36" height="257" rx="7" fill="#00c8ff" opacity=".90"/>
  <rect x="342" y="235" width="36" height="217" rx="7" fill="#00c8ff" opacity=".85"/>
  <rect x="392" y="285" width="36" height="167" rx="7" fill="#00c8ff" opacity=".75"/>
  <rect x="434" y="330" width="36" height="122" rx="7" fill="#00c8ff" opacity=".65"/>

  <!-- Harman-style target curve overlay -->
  <path d="M42,210 C80,180 120,155 200,140 C280,125 340,150 400,185 C430,202 455,220 470,240"
        fill="none" stroke="#ff7040" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"
        opacity=".9"/>

  <!-- Live response curve (green) -->
  <path d="M42,250 C75,230 110,210 175,200 C240,190 290,195 340,210 C380,222 420,250 470,270"
        fill="none" stroke="#00e87a" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"
        opacity=".85"/>
</svg>
