<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Solid background fills entire square (required for maskable) -->
  <rect width="512" height="512" fill="#10101a"/>

  <!-- All content scaled to 58% and centered so it sits within the
       maskable safe zone (inner 80% = 409px circle at center 256,256).
       Original design spans x:42-470, y:125-452 ’ 428×327px.
       At 0.58 scale: 248×190px, centered ’ origin offset (132, 161) -->
  <g transform="translate(108, 105) scale(0.58)">

    <!-- EQ frequency bars -->
    <rect x="42"  y="290" width="36" height="162" rx="6" fill="#00c8ff" opacity=".72"/>
    <rect x="92"  y="230" width="36" height="222" rx="6" fill="#00c8ff" opacity=".78"/>
    <rect x="142" y="175" width="36" height="277" rx="6" fill="#00c8ff" opacity=".85"/>
    <rect x="192" y="145" width="36" height="307" rx="6" fill="#00c8ff"/>
    <rect x="242" y="162" width="36" height="290" rx="6" fill="#00c8ff"/>
    <rect x="292" y="192" width="36" height="260" rx="6" fill="#00c8ff" opacity=".90"/>
    <rect x="342" y="232" width="36" height="220" rx="6" fill="#00c8ff" opacity=".82"/>
    <rect x="392" y="282" width="36" height="170" rx="6" fill="#00c8ff" opacity=".72"/>
    <rect x="434" y="328" width="36" height="124" rx="6" fill="#00c8ff" opacity=".62"/>

    <!-- Harman target curve (orange dashed) -->
    <path d="M42,210 C80,180 120,155 200,140 C280,125 340,150 400,185 C430,202 455,220 470,240"
          fill="none" stroke="#ff7040" stroke-width="16" stroke-linecap="round"
          stroke-linejoin="round" stroke-dasharray="28,14" opacity=".92"/>

    <!-- Live response curve (green) -->
    <path d="M42,252 C75,232 110,212 175,202 C240,192 290,197 340,212 C380,224 420,252 470,272"
          fill="none" stroke="#00e87a" stroke-width="12" stroke-linecap="round"
          stroke-linejoin="round" opacity=".88"/>
  </g>
</svg>
