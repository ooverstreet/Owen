<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="90" fill="#080810"/>
  <!-- 4 Simon quadrants -->
  <rect x="20"  y="20"  width="222" height="222" rx="30" fill="#1e3a70" stroke="#3b82f6" stroke-width="4"/>
  <rect x="270" y="20"  width="222" height="222" rx="30" fill="#5a1a1a" stroke="#ef4444" stroke-width="4"/>
  <rect x="20"  y="270" width="222" height="222" rx="30" fill="#14401e" stroke="#22c55e" stroke-width="4"/>
  <rect x="270" y="270" width="222" height="222" rx="30" fill="#3d3200" stroke="#eab308" stroke-width="4"/>
  <!-- Glow dots in each -->
  <circle cx="131" cy="131" r="40" fill="#3b82f6" opacity=".9"/>
  <circle cx="381" cy="131" r="40" fill="#ef4444" opacity=".9"/>
  <circle cx="131" cy="381" r="40" fill="#22c55e" opacity=".9"/>
  <circle cx="381" cy="381" r="40" fill="#eab308" opacity=".9"/>
  <!-- Center circle with logo -->
  <circle cx="256" cy="256" r="50" fill="#080810" stroke="#252540" stroke-width="3"/>
  <text x="256" y="268" font-family="-apple-system,sans-serif" font-size="36" font-weight="900" text-anchor="middle" fill="#f0f0ff">j</text>
</svg>
