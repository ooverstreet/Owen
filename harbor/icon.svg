<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B8D4DE"/>
      <stop offset="55%" stop-color="#DCE9EE"/>
      <stop offset="100%" stop-color="#EAF2F4"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6FA8B4"/>
      <stop offset="100%" stop-color="#3E7A86"/>
    </linearGradient>
    <linearGradient id="tower" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A6270"/>
      <stop offset="100%" stop-color="#1F4F58"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#sky)"/>
  <path d="M0 78c18-10 36-10 54 0s36 10 54 0 18-10 20-10v60H0V78z" fill="url(#water)" opacity=".9"/>
  <!-- wider island -->
  <path d="M28 88c7-9 20-13 36-13s29 4 36 13c-11 4-22 6-36 6s-25-2-36-6z" fill="#1F4F58" opacity=".55"/>
  <!-- small palms — drooping fronds, classic silhouette -->
  <g stroke-linecap="round" fill="none">
    <!-- left palm -->
    <path d="M39 86.5c-1-4-.5-8 0-11.5" stroke="#1F4F58" stroke-width="1.55"/>
    <g stroke="#3E7A86" stroke-width="1.4">
      <path d="M39 75C33 74 29 78 27.5 83"/>
      <path d="M39 75C45 74 49 78 50.5 83"/>
      <path d="M39 75C32 71 29 72 27 75"/>
      <path d="M39 75C46 71 49 72 51 75"/>
      <path d="M39 75C36 69 33 68 31 69"/>
      <path d="M39 75C42 69 45 68 47 69"/>
    </g>
    <!-- right palm (slightly smaller) -->
    <path d="M90 87c-.7-3.2-.3-6.5 0-9.2" stroke="#1F4F58" stroke-width="1.35"/>
    <g stroke="#3E7A86" stroke-width="1.2">
      <path d="M90 77.8C85.2 77 82 80 80.8 84"/>
      <path d="M90 77.8C94.8 77 98 80 99.2 84"/>
      <path d="M90 77.8C84.5 74.5 82 75.2 80.5 77.5"/>
      <path d="M90 77.8C95.5 74.5 98 75.2 99.5 77.5"/>
      <path d="M90 77.8C87.5 73 85 72.2 83.5 73"/>
      <path d="M90 77.8C92.5 73 95 72.2 96.5 73"/>
    </g>
  </g>
  <path d="M52 86L56 40h16l4 46H52z" fill="url(#tower)"/>
  <path d="M54.8 62h18.4l.6 8H54.2l.6-8z" fill="#EAF2F4" opacity=".35"/>
  <!-- lantern room + dome -->
  <rect x="54" y="28" width="20" height="14" rx="2.5" fill="#1F4F58"/>
  <path d="M52 28h24" stroke="#C9A66B" stroke-width="2" stroke-linecap="round"/>
  <path d="M54 28c0-8 6-12 10-12s10 4 10 12H54z" fill="#1F4F58"/>
  <!-- 4 rays from one bulb into the sky -->
  <g stroke="#C9A66B" stroke-linecap="round">
    <path d="M64 35L102 8" stroke-width="1.8" opacity=".45"/>
    <path d="M64 35L112 18" stroke-width="2.4" opacity=".65"/>
    <path d="M64 35L116 35" stroke-width="3.4"/>
    <path d="M64 35L110 52" stroke-width="2" opacity=".5"/>
  </g>
  <!-- single central bulb -->
  <circle cx="64" cy="35" r="3.6" fill="#C9A66B"/>
  <circle cx="64" cy="35" r="1.5" fill="#F2E2B8"/>
  <path d="M18 96c12-5 24-5 36 0s24 5 36 0 20-5 20-5" stroke="#EAF2F4" stroke-width="2.5" stroke-linecap="round" opacity=".55"/>
</svg>
