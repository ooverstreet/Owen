  </defs>
  <rect width="128" height="128" rx="28" fill="url(#sky)"/>
  <path d="M0 78c18-10 36-10 54 0s36 10 54 0 18-10 20-10v60H0V78z" fill="url(#water)" opacity=".9"/>
