  <path d="M74 32L108 18" stroke="#C9A66B" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M74 36L110 30" stroke="#C9A66B" stroke-width="2.2" stroke-linecap="round" opacity=".55"/>
  <path d="M74 28L104 10" stroke="#C9A66B" stroke-width="1.8" stroke-linecap="round" opacity=".4"/>
  <path d="M18 96c12-5 24-5 36 0s24 5 36 0 20-5 20-5" stroke="#EAF2F4" stroke-width="2.5" stroke-linecap="round" opacity=".55"/>
